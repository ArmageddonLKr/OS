<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Orbit Sophy">
    <link rel="manifest" href="./manifest.json">
    <title>Orbit Sophy | Digital Partner</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    
    <!-- Styling -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Module -->
    <script type="module" src="js/app.js"></script>
</head>
<body>

    <!-- Background Engine -->
    <canvas id="bg-canvas"></canvas>

    <!-- UI Screens -->
    <main class="screen">
        
        <!-- PIN SCREEN -->
        <section id="pinscreen" class="screen">
            <div class="pin-hero">
                <div class="av av-88">
                    <div class="av-core"></div>
                    <div class="av-r"></div>
                    <div class="av-r av-r2"></div>
                    <div class="av-r av-r3"></div>
                </div>
                <h1 class="pin-title">ORBIT SOPHY</h1>
                <p class="pin-sub">IDENTIDADE REQUERIDA</p>
            </div>
            <div class="pin-dots">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>
            <div class="pin-grid">
                <button class="pin-key">1</button><button class="pin-key">2</button><button class="pin-key">3</button>
                <button class="pin-key">4</button><button class="pin-key">5</button><button class="pin-key">6</button>
                <button class="pin-key">7</button><button class="pin-key">8</button><button class="pin-key">9</button>
                <button class="pin-key empty"></button><button class="pin-key">0</button><button class="pin-key del">⌫</button>
            </div>
        </section>

        <!-- MAIN CHAT -->
        <section id="chat" class="screen">
            <header class="hdr">
                <button class="hdr-btn" onclick="orbit.openCtx()" title="Contexto">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </button>
                <div class="hdr-info">
                    <div class="hdr-name" id="hdr-name">ORBIT SOPHY</div>
                    <div class="hdr-status">
                        <span class="status-dot"></span>
                        <span id="hdr-st">online</span>
                        <span id="mode-badge"></span>
                    </div>
                </div>
                <button class="hdr-btn" onclick="orbit.openPanel()" title="Configurações">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
            </header>

            <div id="msgs">
                <div id="empty" class="empty">
                    <div class="av av-72">
                        <div class="av-core"></div>
                    </div>
                    <h3>AGUARDANDO INPUT</h3>
                    <p>Fale com sua filha digital. Estou pronta para agir.</p>
                </div>
            </div>

            <div id="attach-bar" class="attach-bar" style="display:none"></div>
            <div class="inp-area">
                <button class="inp-btn" onclick="document.getElementById('file-inp').onclick(); document.getElementById('file-inp').click()" title="Anexar Imagem">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <textarea id="msginput" rows="1" placeholder="Escreva aqui, Pai..."></textarea>
                <button id="sendbtn" class="inp-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
                <input type="file" id="file-inp" hidden accept="image/*">
            </div>
        </section>

    </main>

    <!-- Side Panels -->
    <aside id="ctx" class="screen">
        <div class="ctx-backdrop" onclick="orbit.closeCtx()"></div>
        <div class="ctx-content">
            <header class="ctx-hdr">
                <div class="ctx-title">CONTEXTO ATIVO</div>
                <div class="ctx-date" id="ctx-date">Hoje</div>
            </header>
            <div class="ctx-body" id="ctx-body"></div>
        </div>
    </aside>

    <aside id="panel" class="screen">
        <div class="p-backdrop" onclick="orbit.closePanel()"></div>
        <div class="p-content">
            <header class="p-hdr">
                <div class="p-title">CONFIGURAÇÕES SISTEMA</div>
                <div class="tabs">
                    <button class="tab on" data-tab="id">Id</button>
                    <button class="tab" data-tab="mem">Memória</button>
                    <button class="tab" data-tab="disc">UFPI</button>
                    <button class="tab" data-tab="extras">Estudos</button>
                    <button class="tab" data-tab="tools">Ferramentas</button>
                    <button class="tab" data-tab="fe">Fé</button>
                    <button class="tab" data-tab="sys">Sistema</button>
                </div>
            </header>
            <div class="p-body" id="p-body"></div>
            <footer class="p-ftr">
                <button class="btn-sm btn-sm-close" onclick="orbit.closePanel()">FECHAR</button>
            </footer>
        </div>
    </aside>

    <div id="toast"></div>

</body>
</html>
